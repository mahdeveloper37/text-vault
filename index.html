<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZORK ZONE — Text Adventure Arcade</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/ifvms/dist/zvm.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00ff41;
    --green-dim: #00b32d;
    --green-glow: rgba(0,255,65,0.15);
    --green-faint: rgba(0,255,65,0.05);
    --amber: #ffb000;
    --amber-dim: #cc8800;
    --bg: #000000;
    --bg-panel: #050f05;
    --bg-card: #030a03;
    --border: #00ff4133;
    --border-bright: #00ff4166;
    --text-dim: #00803a;
    --scanline: rgba(0,0,0,0.25);
  }

  html { background: #000; }

  body {
    font-family: 'Share Tech Mono', monospace;
    background: var(--bg);
    color: var(--green);
    min-height: 100vh;
    overflow-x: hidden;
    animation: flicker 8s infinite;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, var(--scanline) 0px, var(--scanline) 1px, transparent 1px, transparent 3px);
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  @keyframes flicker {
    0%,100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.92; }
    94% { opacity: 1; }
    96% { opacity: 0.95; }
    97% { opacity: 1; }
  }

  header {
    text-align: center;
    padding: 2rem 1rem 1.5rem;
    border-bottom: 1px solid var(--border-bright);
  }

  .site-logo {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 900;
    color: var(--green);
    text-shadow: 0 0 20px var(--green);
    letter-spacing: 0.15em;
  }

  nav {
    display: flex;
    justify-content: center;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
  }

  nav button {
    font-family: 'Share Tech Mono', monospace;
    color: var(--text-dim);
    background: none;
    border: none;
    border-right: 1px solid var(--border);
    padding: 0.7rem 1.4rem;
    cursor: pointer;
    text-transform: uppercase;
  }

  nav button:hover, nav button.active { color: var(--green); background: var(--green-faint); }

  main { max-width: 1200px; margin: 0 auto; padding: 1.5rem 1rem; }
  .page { display: none; }
  .page.active { display: block; }

  /* Arcade Grid */
  .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.2rem; }
  .game-card { background: var(--bg-card); border: 1px solid var(--border); padding: 1.2rem; cursor: pointer; transition: 0.2s; }
  .game-card:hover { border-color: var(--green); box-shadow: 0 0 15px var(--green-glow); }
  .card-title { font-family: 'VT323', monospace; font-size: 1.8rem; color: var(--green); margin-bottom: 0.5rem; }
  .play-btn { background: var(--green-dim); border: none; padding: 0.4rem 1rem; cursor: pointer; float: right; color: #000; font-weight: bold; }

  /* Player Interface */
  #game-player { display: none; flex-direction: column; height: 80vh; }
  #game-player.active { display: flex; }

  .status-bar { display: flex; justify-content: space-between; padding: 0.5rem 1rem; background: #111; border: 1px solid var(--border); font-size: 0.8rem; color: var(--amber); }
  .game-screen { flex: 1; background: var(--bg-panel); border: 1px solid var(--border-bright); border-top: none; padding: 1.2rem; overflow-y: auto; line-height: 1.6; }
  .input-row { display: flex; padding: 0.5rem 1rem; background: #000; border: 1px solid var(--border-bright); border-top: none; }
  .game-input { flex: 1; background: none; border: none; color: var(--amber); outline: none; font-family: 'Share Tech Mono'; font-size: 1rem; }

  .output-line { margin-bottom: 0.4rem; white-space: pre-wrap; }
  .system { color: #666; font-style: italic; }
  .error { color: #ff4040; font-weight: bold; }
  .success { color: #00ffaa; }
  .player-input { color: var(--amber-dim); font-weight: bold; }
</style>
</head>
<body>

<header>
  <div class="site-logo">ZORK ZONE</div>
  <div class="site-tagline">► Retro Text Adventure Engine ◄</div>
</header>

<nav>
  <button class="active" onclick="showPage('arcade', this)">[ ARCADE ]</button>
  <button onclick="showPage('about', this)">[ HOW TO PLAY ]</button>
</nav>

<main>
  <div class="page active" id="page-arcade">
    <div class="game-grid" id="game-grid"></div>
  </div>

  <div class="page" id="page-about">
    <div style="max-width: 600px; margin: 0 auto; line-height: 1.8;">
      <h2 style="color:var(--amber)">How to Play</h2>
      <p>Type commands like "GO NORTH", "TAKE LAMP", or "EXAMINE MAILBOX" to interact with the world.</p>
      <p>Standard shortcuts: N, S, E, W for directions, I for inventory, L for look.</p>
    </div>
  </div>
</main>

<div id="game-player" class="container">
  <div class="status-bar">
    <span id="status-location">LOCATION: ---</span>
    <span id="status-score">SCORE: 0 | MOVES: 0</span>
  </div>
  <div class="game-screen" id="game-screen"></div>
  <div class="input-row">
    <span style="margin-right:10px;">&gt;</span>
    <input class="game-input" id="game-input" type="text" autofocus autocomplete="off">
  </div>
</div>

<script>
const GAMES = [
  { id: 'zork1', title: 'ZORK I', author: 'Infocom', desc: 'The classic underground empire adventure.', file: 'zork1.z3' },
  { id: 'zork1_v5', title: 'ZORK I (Ver 5)', author: 'Infocom', desc: 'The expanded Version 5 edition.', file: 'zork1.z5' }
];

let currentEngine = null;

// Renamed to avoid window.print conflict
function printToScreen(text, cls = '') {
  const screen = document.getElementById('game-screen');
  const div = document.createElement('div');
  div.className = 'output-line ' + cls;
  div.textContent = text;
  screen.appendChild(div);
  screen.scrollTop = screen.scrollHeight;
}

function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.getElementById('game-player').classList.remove('active');
  document.querySelector('main').style.display = 'block';
}

async function startGame(id) {
  const g = GAMES.find(x => x.id === id);
  document.querySelector('main').style.display = 'none';
  document.getElementById('game-player').classList.add('active');
  document.getElementById('game-screen').innerHTML = '';

  try {
    const response = await fetch(`./scripts/${g.file}`);
    if (!response.ok) throw new Error("Could not find " + g.file);
    const buffer = await response.arrayBuffer();
    const data = new Uint8Array(buffer);

    printToScreen('--- ENGINE COLD BOOT ---', 'system');
    printToScreen(`Load Address: ${g.file}`, 'system');

    // 1. Initialize Engine
    currentEngine = new ZVM();

    // 2. THE GLK SHIM
    // satisfies the "Reference to Glk is required" error
    currentEngine.glk = {
      window_get_rock: () => 0,
      window_open: () => 1,
      window_clear: () => { document.getElementById('game-screen').innerHTML = ''; },
      window_move_cursor: () => {},
      set_window: () => {},
      put_string: (text) => printToScreen(text),
      char_to_lower: (c) => String.fromCharCode(c).toLowerCase().charCodeAt(0),
      char_to_upper: (c) => String.fromCharCode(c).toUpperCase().charCodeAt(0),
      select: (ev) => { if (currentEngine.on_select) currentEngine.on_select(ev); },
      fatal_error: (msg) => printToScreen("FATAL: " + msg, 'error')
    };

    // 3. UI Handlers
    const myUI = {
      print: (text) => printToScreen(text),
      updateStatus: (loc, sc, mv) => {
        document.getElementById('status-location').textContent = 'LOCATION: ' + loc;
        document.getElementById('status-score').textContent = `SCORE: ${sc} | MOVES: ${mv}`;
      }
    };

    // 4. Run
    currentEngine.prepare(data, myUI);
    printToScreen('Running...', 'success');
    currentEngine.run();

  } catch (err) {
    printToScreen('BOOT FAILURE: ' + err.message, 'error');
  }
}

function submitCommand() {
  const inp = document.getElementById('game-input');
  const cmd = inp.value.trim();
  if (!cmd || !currentEngine) return;

  printToScreen('> ' + cmd.toUpperCase(), 'player-input');
  inp.value = '';

  // Deliver input to the Z-Machine
  if (currentEngine.deliver_input) {
    currentEngine.deliver_input(cmd);
  } else if (currentEngine.provideInput) {
    currentEngine.provideInput(cmd);
  }
}

document.getElementById('game-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') submitCommand();
});

// Render Cards
const grid = document.getElementById('game-grid');
GAMES.forEach(g => {
  const div = document.createElement('div');
  div.className = 'game-card';
  div.innerHTML = `
    <div class="card-title">${g.title}</div>
    <div style="color:var(--text-dim); font-size:0.8rem; margin-bottom:10px;">${g.author}</div>
    <div style="font-size:0.9rem; margin-bottom:15px;">${g.desc}</div>
    <button class="play-btn" onclick="startGame('${g.id}')">PLAY</button>
  `;
  grid.appendChild(div);
});
</script>

</body>
</html>
