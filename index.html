<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZORK ZONE — Text Adventure Arcade</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green: #00ff41;
    --green-dim: #00b32d;
    --green-glow: rgba(0,255,65,0.15);
    --green-faint: rgba(0,255,65,0.05);
    --amber: #ffb000;
    --amber-dim: #cc8800;
    --bg: #000000;
    --bg-panel: #050f05;
    --bg-card: #030a03;
    --border: #00ff4133;
    --border-bright: #00ff4166;
    --text-dim: #00803a;
    --scanline: rgba(0,0,0,0.25);
  }

  html { background: #000; height: 100%; }

  body {
    font-family: 'Share Tech Mono', monospace;
    background: var(--bg);
    color: var(--green);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
    animation: flicker 8s infinite;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, var(--scanline) 0px, var(--scanline) 1px, transparent 1px, transparent 3px);
    pointer-events: none;
    z-index: 9999;
    opacity: 0.4;
  }

  @keyframes flicker {
    0%,100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.92; }
    94% { opacity: 1; }
    96% { opacity: 0.95; }
    97% { opacity: 1; }
  }

  header {
    text-align: center;
    padding: 1.5rem 1rem;
    border-bottom: 1px solid var(--border-bright);
    flex-shrink: 0;
  }

  .site-logo {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.5rem, 5vw, 3rem);
    font-weight: 900;
    color: var(--green);
    text-shadow: 0 0 15px var(--green);
    letter-spacing: 0.15em;
  }

  nav {
    display: flex;
    justify-content: center;
    background: var(--bg-panel);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }

  nav button {
    font-family: 'Share Tech Mono', monospace;
    color: var(--text-dim);
    background: none;
    border: none;
    border-right: 1px solid var(--border);
    padding: 0.6rem 1.2rem;
    cursor: pointer;
    text-transform: uppercase;
    font-size: 0.8rem;
    transition: 0.2s;
  }

  nav button:hover, nav button.active { color: var(--green); background: var(--green-faint); }

  main { flex: 1; max-width: 1000px; width: 100%; margin: 0 auto; padding: 1.5rem 1rem; display: flex; flex-direction: column; }
  .page { display: none; }
  .page.active { display: block; }

  .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.2rem; }
  .game-card { background: var(--bg-card); border: 1px solid var(--border); padding: 1.2rem; cursor: pointer; transition: 0.2s; position: relative; }
  .game-card:hover { border-color: var(--green); box-shadow: 0 0 15px var(--green-glow); }
  .card-title { font-family: 'VT323', monospace; font-size: 1.6rem; color: var(--green); margin-bottom: 0.5rem; }
  .play-btn { background: var(--green-dim); border: none; padding: 0.4rem 1rem; cursor: pointer; float: right; color: #000; font-weight: bold; font-family: 'Share Tech Mono'; }

  /* ── PLAYER WRAPPER ── */
  #player-wrapper {
    display: none;
    flex-direction: column;
    width: 100%;
  }
  #player-wrapper.active { display: flex; }

  .player-topbar {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.5rem 0;
    margin-bottom: 0.5rem;
  }

  .back-btn {
    font-family: 'Share Tech Mono', monospace;
    background: none;
    border: 1px solid var(--border-bright);
    color: var(--green-dim);
    padding: 0.3rem 0.8rem;
    cursor: pointer;
    font-size: 0.8rem;
    text-transform: uppercase;
    transition: 0.2s;
  }
  .back-btn:hover { color: var(--green); border-color: var(--green); }

  .player-title {
    font-family: 'VT323', monospace;
    font-size: 1.3rem;
    color: var(--amber);
    letter-spacing: 1px;
  }

  /*
   * The Parchment iframe fills a fixed-height box so it looks like a terminal.
   * We give it a minimum height so the game is playable without scrolling.
   */
  #parchment-frame {
    width: 100%;
    height: 75vh;
    min-height: 480px;
    border: 1px solid var(--border-bright);
    background: #000;
    display: block;
  }
</style>
</head>
<body>

<header>
  <div class="site-logo">ZORK ZONE</div>
</header>

<nav id="main-nav">
  <button class="active" onclick="showPage('arcade', this)">[ ARCADE ]</button>
  <button onclick="showPage('about', this)">[ HOW TO PLAY ]</button>
</nav>

<main>
  <!-- ARCADE PAGE -->
  <div class="page active" id="page-arcade">
    <div class="game-grid" id="game-grid"></div>
  </div>

  <!-- HOW TO PLAY -->
  <div class="page" id="page-about">
    <div style="max-width: 600px; margin: 0 auto; line-height: 1.8;">
      <h2 style="color:var(--amber); font-family:'VT323'; font-size: 2rem;">How to Play</h2>
      <p>Interactive Fiction is played by typing commands in plain English.</p>
      <ul style="margin: 1rem 0; padding-left: 1.5rem; color: var(--green-dim);">
        <li><b>Movement:</b> Type NORTH, SOUTH, UP, or just N, S, U.</li>
        <li><b>Interaction:</b> TAKE LAMP, OPEN MAILBOX, READ BROCHURE.</li>
        <li><b>System:</b> SAVE to store progress, RESTORE to load, LOOK to see surroundings.</li>
      </ul>
    </div>
  </div>

  <!-- PARCHMENT PLAYER -->
  <div id="player-wrapper">
    <div class="player-topbar">
      <button class="back-btn" onclick="closePlayer()">← BACK</button>
      <span class="player-title" id="player-title"></span>
    </div>
    <!--
      Parchment is loaded inside an iframe so its styles/scripts don't
      interfere with ours. We pass the story URL as a query parameter.
    -->
    <iframe id="parchment-frame"
            title="Game Player"
            allowfullscreen>
    </iframe>
  </div>
</main>

<script>
/*
 * GAMES catalogue
 * ─────────────────────────────────────────────────────────────────────────────
 * `file`  → path relative to index.html (i.e. in your repo root / gh-pages root)
 *
 * Parchment (iplayif.com) accepts a `story` query parameter pointing at any
 * publicly accessible URL.  Because GitHub Pages serves files over HTTPS, we
 * can build the absolute URL from window.location and hand it straight to
 * Parchment.
 */
const GAMES = [
  {
    id: 'zork1',
    title: 'ZORK I: THE GREAT UNDERGROUND EMPIRE',
    author: 'Infocom',
    file: 'zork1.z3'
  }
];

function getStoryURL(file) {
  // Absolute URL so Parchment can fetch it cross-origin from iplayif.com
  const base = window.location.href.replace(/\/[^/]*$/, '/');
  return base + file;
}

function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('player-wrapper').classList.remove('active');
  document.getElementById('main-nav').style.display = 'flex';
  const page = document.getElementById('page-' + id);
  if (page) page.classList.add('active');
  if (btn) {
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
}

function startGame(id) {
  const g = GAMES.find(x => x.id === id);
  if (!g) return;

  // Hide all pages and nav, show player
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('main-nav').style.display = 'none';
  document.getElementById('player-title').textContent = g.title;
  document.getElementById('player-wrapper').classList.add('active');

  // Point the iframe at Parchment with our story file URL
  const storyURL = getStoryURL(g.file);
  const parchmentURL = 'https://iplayif.com/?story=' + encodeURIComponent(storyURL);
  document.getElementById('parchment-frame').src = parchmentURL;
}

function closePlayer() {
  // Stop the iframe (prevents audio / hanging connections)
  document.getElementById('parchment-frame').src = '';
  showPage('arcade', document.querySelector('nav button'));
}

// ── Build game cards ──────────────────────────────────────────────────────────
const grid = document.getElementById('game-grid');
GAMES.forEach(g => {
  const card = document.createElement('div');
  card.className = 'game-card';
  card.onclick = () => startGame(g.id);
  card.innerHTML = `
    <div class="card-title">${g.title}</div>
    <div style="color:var(--text-dim); font-size:0.8rem; margin-bottom:10px;">AUTHOR: ${g.author}</div>
    <button class="play-btn" onclick="event.stopPropagation(); startGame('${g.id}')">START</button>
  `;
  grid.appendChild(card);
});
</script>
</body>
</html>
